name: 🐝 MA-CityOS Swarm Worker

on:
  schedule:
    - cron: '0 * * * *' # Roda a cada 1 hora automaticamente
  workflow_dispatch: # Permite que você rode clicando em um botão no GitHub

jobs:
  evolve_city:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clonar Cidade
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 🏗️ Configurar Ambiente
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar Agentes
        run: |
          pip install -r requirements.txt --quiet

      - name: 🧬 Processar Malha (Expansão e Consolidação)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          python3 main.py
          python3 consolidator.py

      - name: 🛰️ Sincronizar Evolução
        run: |
          git config --global user.email "swarm@macityos.mesh"
          git config --global user.name "Swarm Worker"
          git add .
          git commit -m "🐝 Swarm: Cidade evoluída em 2026-04-18 19:08:22" || echo "Sem mudanças"
          git push origin main
